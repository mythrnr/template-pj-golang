name: "Scan Vulnerabilities"

on:
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_call:
    secrets:
      app-id:
        required: true
      app-private-key:
        required: true
  workflow_dispatch:

permissions:
  contents: "read"

jobs:
  scan-vulnerabilities:
    name: "Scan Vulnerabilities"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    steps:
      - name: "Issue access token"
        id: "issue-token"
        uses: "getsentry/action-github-app-token@5c1e90706fe007857338ac1bfbd7a4177db2f789" # v4.0.0
        with:
          app_id: "${{ secrets.app-id }}"
          private_key: "${{ secrets.app-private-key }}"

      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false
          token: "${{ steps.issue-token.outputs.token }}"

      - name: "Prepare git access"
        uses: "./.github/actions/prepare-git-access"
        with:
          secret-token: "${{ steps.issue-token.outputs.token }}"

      - uses: "actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16" # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: "Run vulnerability check"
        run: "make vulnerability-check"
